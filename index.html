    if(hasCo){
      s.push({id:"coIncomeType",section:"共同借款人收入",q:"共同借款人的收入类型？",type:"choice",opts:["工资收入 (W2)","自雇","跳过"],req:true});
      if(answers.coIncomeType==="工资收入 (W2)"){s.push({id:"coEmployerName",q:"共同借款人的雇主？",type:"text",ph:"公司名称",req:true});s.push({id:"coPosition",q:"共同借款人的职位？",type:"text",ph:"职位",req:true});s.push({id:"coDuration",q:"工作多长时间？",type:"duration",req:true});}
      if(answers.coIncomeType==="自雇"){s.push({id:"coBusinessName",q:"企业名称？",type:"text",ph:"企业名称",req:true});s.push({id:"coOwnership",q:"是否拥有25%以上股份？",type:"choice",opts:["是，25%以上","低于25%"],req:true});s.push({id:"coDuration",q:"自雇多长时间？",type:"duration",req:true});}
    }
    s.push({id:"declarations",section:"声明",q:"",type:"declarations",req:false});
    if(hasCo)s.push({id:"coDeclarations",section:"共同借款人声明",q:"",type:"coDeclarations",req:false});
    s.push({id:"attestation",section:"提交",q:"",type:"attestation",req:true});
  }
  return s;
}

function genSummary(){
  const steps=getSteps();const t=LANG[lang];const isPurch=answers.transaction===(lang==='en'?'Purchase':'购房');
  let s="=== LOAN APPLICATION SUMMARY ===\n";let sec="";
  for(const st of steps){
    if(st.section&&st.section!==sec){sec=st.section;s+="\n--- "+sec+" ---\n";}
    if(st.type==="declarations"){s+="\n[Borrower Declarations]\n";for(const d of[...DEC_PROPERTY[lang],...DEC_FINANCIAL[lang]]){if(d.purchaseOnly&&!isPurch)continue;s+=d.q+" "+(dec[d.id]||"N/A")+"\n";}if(dec.bankruptcyType)s+="Type: "+dec.bankruptcyType+"\n";}
    else if(st.type==="coDeclarations"){s+="\n[Co-Borrower Declarations]\n";for(const d of[...DEC_PROPERTY[lang],...DEC_FINANCIAL[lang]]){if(d.purchaseOnly&&!isPurch)continue;s+=d.q+" "+(coDec[d.id]||"N/A")+"\n";}if(coDec.bankruptcyType)s+="Type: "+coDec.bankruptcyType+"\n";}
    else if(st.type!=="attestation"&&answers[st.id]){if(st.type==="duration"){const p=answers[st.id].split("|");s+=st.q+" "+(p[0]||0)+" yrs, "+(p[1]||0)+" mos\n";}else s+=st.q+" "+answers[st.id]+"\n";}
  }
  return s;
}

function goNext(){const steps=getSteps();if(step<steps.length-1)step++;else phase="review";render();}
function goBack(){if(step>0)step--;else step=-1;render();}
function pick(val){const steps=getSteps();answers[steps[step].id]=val;setTimeout(()=>{goNext();},200);}

function toggleLang(){
  const map=lang==='en'?MAP_EN_ZH:MAP_ZH_EN;
  answers=translateObj(answers,map);dec=translateObj(dec,map);coDec=translateObj(coDec,map);
  lang=lang==='en'?'zh':'en';render();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const app=document.getElementById('app');
  const t=LANG[lang];
  const steps=getSteps();
  const total=steps.length;
  const cur=steps[step];
  const isPurch=answers.transaction===(lang==='en'?'Purchase':'购房');
  let h='';

  // WELCOME
  if(step===-1&&phase==='form'){
    h+=`<button class="lang-btn" onclick="toggleLang()">${t.lang}</button>`;
    h+=`<div style="text-align:center;padding-top:8px;margin-bottom:28px"><div class="jc">JC</div><h1>${t.title}</h1><p class="sub">${t.subtitle}</p><p class="co">${t.company}</p></div>`;
    h+=`<div class="info-box">${t.startSub}</div>`;
    h+=`<button class="primary" onclick="step=0;render()">${t.start}</button>`;
    app.innerHTML=h;document.body.style.justifyContent='center';return;
  }

  // REVIEW
  if(phase==='review'){
    document.body.style.justifyContent='flex-start';
    h+=`<h2 style="font-size:1.3rem;font-weight:700;color:#3a2e1e;text-align:center;margin:0 0 4px">${t.review}</h2>`;
    h+=`<p style="color:#8a7a60;font-size:.82rem;text-align:center;margin-bottom:20px">${t.reviewSub}</p>`;
    h+=`<div class="review-scroll">`;
    let sec="";
    for(const st of steps){
      if(st.section&&st.section!==sec){sec=st.section;h+=`<div class="review-section"><div class="review-label">${sec}</div>`;}
      if(st.type==="declarations"){for(const d of[...DEC_PROPERTY[lang],...DEC_FINANCIAL[lang]]){if(d.purchaseOnly&&!isPurch)continue;if(dec[d.id])h+=`<div class="review-row"><span class="review-q">${d.q}</span><span class="review-a">${esc(dec[d.id])}</span></div>`;}}
      else if(st.type==="coDeclarations"){for(const d of[...DEC_PROPERTY[lang],...DEC_FINANCIAL[lang]]){if(d.purchaseOnly&&!isPurch)continue;if(coDec[d.id])h+=`<div class="review-row"><span class="review-q">${d.q}</span><span class="review-a">${esc(coDec[d.id])}</span></div>`;}}
      else if(st.type!=="attestation"&&answers[st.id]){let v=answers[st.id];if(st.type==="duration"){const p=v.split("|");v=(p[0]||0)+" "+t.years+", "+(p[1]||0)+" "+t.months;}h+=`<div class="review-row"><span class="review-q">${st.q}</span><span class="review-a">${esc(v)}</span></div>`;}
    }
    h+=`</div></div>`;
    h+=`<button class="primary" onclick="phase='done';render()">${t.submit}</button>`;
    h+=`<div class="nav-center"><button class="ghost" onclick="phase='form';step=${total-1};render()">${t.back}</button></div>`;
    app.innerHTML=h;return;
  }

  // DONE
  if(phase==='done'){
    document.body.style.justifyContent='center';
    const summary=encodeURIComponent(genSummary());
    const subj=encodeURIComponent("Loan Application - "+(answers.borrowerFirst||"")+" "+(answers.borrowerLast||""));
    h+=`<div style="text-align:center"><div class="done-check">✓</div>`;
    h+=`<h2 class="done-title">${t.submitted}</h2>`;
    h+=`<p style="color:#6b5c42;font-size:.92rem;line-height:1.5;margin-bottom:6px">${t.submittedSub}</p>`;
    h+=`<p style="color:#8a7a60;font-size:.82rem;line-height:1.5;margin-bottom:24px">${t.submittedNote}</p>`;
    h+=`<div class="done-btns">`;
    h+=`<a href="sms:9295235865&body=${summary}" style="text-decoration:none"><button class="primary" style="display:flex;align-items:center;justify-content:center;gap:8px">${t.textJack}</button></a>`;
    h+=`<a href="mailto:jack.chen@gmccloan.com?subject=${subj}&body=${summary}" style="text-decoration:none"><button class="primary" style="background:#92400e;display:flex;align-items:center;justify-content:center;gap:8px">${t.emailJack}</button></a>`;
    h+=`<button class="secondary-btn" id="copyBtn" onclick="copySum()">${t.copyText}</button>`;
    h+=`</div>`;
    h+=`<p style="color:#a0926e;font-size:.75rem;margin-top:16px;line-height:1.4">${lang==='en'?'Or call Jack directly: ':'或直接致电 Jack: '}<a href="tel:9295235865" style="color:#b45309;font-weight:600;text-decoration:none">929-523-5865</a></p>`;
    h+=`</div>`;
    app.innerHTML=h;return;
  }

  document.body.style.justifyContent='center';

  // DECLARATIONS
  if(cur.type==='declarations'||cur.type==='coDeclarations'){
    const isCo=cur.type==='coDeclarations';
    const store=isCo?coDec:dec;
    const yesLabel=lang==='en'?'Yes':'是';const noLabel=lang==='en'?'No':'否';
    h+=`<button class="lang-btn" onclick="toggleLang()">${t.lang}</button>`;
    h+=`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="sec-label">${cur.section}</span><span style="font-size:.72rem;color:#a0926e">${step+1} ${t.of} ${total}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${((step+1)/total)*100}%"></div></div></div>`;
    h+=`<h2 style="font-size:1.15rem;font-weight:700;color:#3a2e1e;margin:16px 0 4px">${isCo?t.coDecTitle:t.decTitle}</h2>`;
    h+=`<p style="font-size:.82rem;color:#8a7a60;margin-bottom:16px;line-height:1.4">${isCo?t.coDecSub:t.decSub}</p>`;
    h+=`<div class="scroll-area">`;
    h+=`<div class="dec-section-label">${t.decProperty}</div>`;
    for(const d of DEC_PROPERTY[lang]){
      if(d.purchaseOnly&&!isPurch)continue;
      h+=`<div class="dec-row"><div class="dec-q">${d.q}</div><div class="dec-btns"><div class="dec-btn${store[d.id]===yesLabel?' sel':''}" onclick="${isCo?'coDec':'dec'}['${d.id}']='${yesLabel}';render()">${yesLabel}</div><div class="dec-btn${store[d.id]===noLabel?' sel':''}" onclick="${isCo?'coDec':'dec'}['${d.id}']='${noLabel}';render()">${noLabel}</div></div></div>`;
    }
    h+=`<div class="dec-section-label mt">${t.decFinancial}</div>`;
    for(const d of DEC_FINANCIAL[lang]){
      h+=`<div class="dec-row"><div class="dec-q">${d.q}</div><div class="dec-btns"><div class="dec-btn${store[d.id]===yesLabel?' sel':''}" onclick="${isCo?'coDec':'dec'}['${d.id}']='${yesLabel}';render()">${yesLabel}</div><div class="dec-btn${store[d.id]===noLabel?' sel':''}" onclick="${isCo?'coDec':'dec'}['${d.id}']='${noLabel}';render()">${noLabel}</div></div></div>`;
    }
    if(store.bankruptcy===yesLabel){
      h+=`<div style="padding:12px 0"><div style="font-size:.82rem;color:#4a3f32;margin-bottom:8px">${lang==='en'?'Identify the type(s) of bankruptcy:':'请选择破产类型：'}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
      for(const bt of BK_TYPES[lang])h+=`<div class="pill${store.bankruptcyType===bt?' sel':''}" onclick="${isCo?'coDec':'dec'}.bankruptcyType='${bt}';render()">${bt}</div>`;
      h+=`</div></div>`;
    }
    h+=`</div>`;
    h+=`<button class="primary" style="margin-top:16px" onclick="goNext()">${t.next}</button>`;
    h+=`<div class="nav-center"><button class="ghost" onclick="goBack()">${t.back}</button></div>`;
    app.innerHTML=h;return;
  }

  // ATTESTATION
  if(cur.type==='attestation'){
    h+=`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="sec-label">${cur.section}</span><span style="font-size:.72rem;color:#a0926e">${step+1} ${t.of} ${total}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${((step+1)/total)*100}%"></div></div></div>`;
    h+=`<h2 style="font-size:1.15rem;font-weight:700;color:#3a2e1e;margin:16px 0 12px">${t.attestTitle}</h2>`;
    h+=`<div class="attest-box"><p class="attest-text">${t.attestText}</p></div>`;
    h+=`<div class="check-row" onclick="attested=!attested;render()"><div class="checkbox${attested?' checked':''}">${attested?'✓':''}</div><span style="font-size:.88rem;color:#4a3f32;line-height:1.4">${t.attestCheck}</span></div>`;
    h+=`<button class="primary" ${attested?'':'disabled'} onclick="goNext()">${t.review} →</button>`;
    h+=`<div class="nav-center"><button class="ghost" onclick="goBack()">${t.back}</button></div>`;
    app.innerHTML=h;return;
  }

  // STANDARD QUESTION
  h+=`<button class="lang-btn" onclick="toggleLang()">${t.lang}</button>`;
  h+=`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="sec-label">${cur.section||''}</span><span style="font-size:.72rem;color:#a0926e">${step+1} ${t.of} ${total}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${((step+1)/total)*100}%"></div></div></div>`;
  h+=`<div class="q-area">`;
  h+=`<h2 class="q-title">${cur.q}</h2>`;
  if(cur.sub)h+=`<p class="q-sub">${cur.sub}</p>`;
  else h+=`<div style="height:12px"></div>`;

  if(cur.type==='choice'){
    h+=`<div class="pills">`;
    for(const opt of cur.opts)h+=`<div class="pill${answers[cur.id]===opt?' sel':''}" onclick="pick('${esc(opt)}')">${opt}</div>`;
    h+=`</div>`;
  }
  if(cur.type==='text'){
    const canGo=cur.req?!!answers[cur.id]:true;
    h+=`<input class="text-input" id="qinput" type="text" placeholder="${esc(cur.ph||'')}" value="${esc(answers[cur.id]||'')}" oninput="answers['${cur.id}']=this.value;document.getElementById('nextbtn').disabled=this.value===''&&${cur.req}" onkeydown="if(event.key==='Enter'&&!document.getElementById('nextbtn').disabled)goNext()">`;
    h+=`<button class="primary" id="nextbtn" style="margin-top:16px" ${canGo?'':'disabled'} onclick="goNext()">${step===total-1?t.review:t.next}</button>`;
  }
  if(cur.type==='duration'){
    const parsed=(answers[cur.id]||'').split('|');const yrs=parsed[0]||'';const mos=parsed[1]||'';
    h+=`<div class="dur-wrap"><div style="flex:1"><label class="dur-label">${t.years}</label><select class="dur-select" onchange="const p=(answers['${cur.id}']||'').split('|');answers['${cur.id}']=this.value+'|'+(p[1]||'');render()"><option value="">--</option>`;
    for(let i=0;i<=50;i++)h+=`<option value="${i}"${yrs==String(i)?' selected':''}>${i}</option>`;
    h+=`</select></div><div style="flex:1"><label class="dur-label">${t.months}</label><select class="dur-select" onchange="const p=(answers['${cur.id}']||'').split('|');answers['${cur.id}']=(p[0]||'')+'|'+this.value;render()"><option value="">--</option>`;
    for(let i=0;i<12;i++)h+=`<option value="${i}"${mos==String(i)?' selected':''}>${i}</option>`;
    h+=`</select></div></div>`;
    h+=`<button class="primary" style="margin-top:16px" onclick="goNext()">${t.next}</button>`;
  }
  h+=`</div>`;
  h+=`<div class="nav-center"><button class="ghost" onclick="goBack()">${t.back}</button></div>`;
  app.innerHTML=h;

  if(cur.type==='text'){const inp=document.getElementById('qinput');if(inp)setTimeout(()=>inp.focus(),100);}
}

function copySum(){
  navigator.clipboard.writeText(genSummary()).then(()=>{
    const btn=document.getElementById('copyBtn');if(btn){btn.textContent=LANG[lang].copied;setTimeout(()=>{btn.textContent=LANG[lang].copyText;},2000);}
  });
}

render();
</script>
</body>
</html>
