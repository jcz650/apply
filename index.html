op:8px}.progress-fill{height:100%;background:#b45309;border-radius:2px;transition:width .4s ease}.pill{padding:14px 20px;border-radius:12px;border:1.5px solid #e0d5c5;background:#fffcf7;color:#4a3f32;cursor:pointer;font-size:.95rem;font-weight:400;font-family:'Newsreader',serif;text-align:center;transition:all .15s;width:100%}.pill:hover{border-color:#b45309}.pill.sel{border:2px solid #b45309;background:#b45309;color:#fff;font-weight:600}.text-input{width:100%;padding:16px 18px;border-radius:14px;border:1.5px solid #e0d5c5;font-size:1rem;font-family:'Newsreader',serif;background:#fffcf7;color:#3a3020;outline:none;transition:border-color .2s}.text-input:focus{border-color:#b45309}.q-area{min-height:220px;display:flex;flex-direction:column;justify-content:center;padding:20px 0 8px}.q-title{font-size:1.25rem;font-weight:600;color:#3a2e1e;margin:0 0 6px;line-height:1.4}.q-sub{font-size:.82rem;color:#8a7a60;margin:0 0 18px;line-height:1.4}.pills{display:flex;flex-direction:column;gap:10px}.nav-center{display:flex;justify-content:center;padding-top:4px}.dec-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f0e8dc}.dec-q{flex:1;font-size:.85rem;color:#4a3f32;line-height:1.45}.dec-btns{display:flex;gap:6px;flex-shrink:0}.dec-btn{padding:6px 16px;border-radius:8px;border:1.5px solid #e0d5c5;background:#fffcf7;color:#6b5c4a;cursor:pointer;font-size:.8rem;font-weight:400;font-family:'Newsreader',serif;transition:all .12s;min-width:52px;text-align:center}.dec-btn.sel{border:2px solid #b45309;background:#b45309;color:#fff;font-weight:600}.dec-section-label{font-size:.68rem;font-weight:700;color:#b4956a;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;padding-bottom:4px;border-bottom:2px solid #f0e4d0}.dec-section-label.mt{margin-top:20px}.dur-wrap{display:flex;gap:10px}.dur-label{font-size:.7rem;color:#9a8e7e;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:block}.dur-select{padding:12px
