function genSummary(){
  const steps=getSteps();const t=LANG[lang];const isPurch=answers.transaction===(lang==='en'?'Purchase':'\u8d2d\u623f');
  let s="=== LOAN APPLICATION SUMMARY ===\n";let sec="";
  for(const st of steps){
    if(st.section&&st.section!==sec){sec=st.section;s+="\n--- "+sec+" ---\n";}
    if(st.type==="declarations"){s+="\n[Borrower Declarations]\n";for(const d of[...DEC_PROPERTY[lang],...DEC_FINANCIAL[lang]]){if(d.purchaseOnly&&!isPurch)continue;s+=d.q+" "+(dec[d.id]||"N/A")+"\n";}if(dec.bankruptcyType)s+="Type: "+dec.bankruptcyType+"\n";}
    else if(st.type==="coDeclarations"){s+="\n[Co-Borrower Declarations]\n";for(const d of[...DEC_PROPERTY[lang],...DEC_FINANCIAL[lang]]){if(d.purchaseOnly&&!isPurch)continue;s+=d.q+" "+(coDec[d.id]||"N/A")+"\n";}if(coDec.bankruptcyType)s+="Type: "+coDec.bankruptcyType+"\n";}
    else if(st.type==="multi"){const vals=st.fields.map(f=>answers[f.id]||'').filter(Boolean).join(' ');if(vals)s+=st.q+" "+vals+"\n";}
    else if(st.type!=="attestation"&&answers[st.id]){if(st.type==="duration"){const p=answers[st.id].split("|");s+=st.q+" "+(p[0]||0)+" yrs, "+(p[1]||0)+" mos\n";}else s+=st.q+" "+answers[st.id]+"\n";}
  }
  return s;
}

function goNext(){const steps=getSteps();if(step<steps.length-1)step++;else phase="review";render();}
function goBack(){if(step>0)step--;else step=-1;render();}
function pick(val){const steps=getSteps();answers[steps[step].id]=val;setTimeout(function(){goNext();},200);}

function toggleLang(){
  const map=lang==='en'?MAP_EN_ZH:MAP_ZH_EN;
  answers=translateObj(answers,map);dec=translateObj(dec,map);coDec=translateObj(coDec,map);
  lang=lang==='en'?'zh':'en';render();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  if(cur.type==='duration'){
    var parsed=(answers[cur.id]||'').split('|');var yrs=parsed[0]||'';var mos=parsed[1]||'';
    h+='<div class="dur-wrap"><div style="flex:1"><label class="dur-label">'+t.years+'</label><select class="dur-select" onchange="var p=(answers[\''+cur.id+'\']\'||\'\'\').split(\'|\');answers[\''+cur.id+'\']=this.value+\'|\'+(p[1]||\'\');render()"><option value="">--</option>';
    for(var i=0;i<=50;i++)h+='<option value="'+i+'"'+(yrs==String(i)?' selected':'')+'>'+i+'</option>';
    h+='</select></div><div style="flex:1"><label class="dur-label">'+t.months+'</label><select class="dur-select" onchange="var p=(answers[\''+cur.id+'\']\'||\'\'\').split(\'|\');answers[\''+cur.id+'\']=((p[0]||\'\'))+\'|\'+this.value;render()"><option value="">--</option>';
    for(var i=0;i<12;i++)h+='<option value="'+i+'"'+(mos==String(i)?' selected':'')+'>'+i+'</option>';
    h+='</select></div></div>';
    h+='<button class="primary" style="margin-top:16px" onclick="goNext()">'+t.next+'</button>';
  }
  if(cur.type==='multi'){
    var cols=cur.fields.length>2?2:cur.fields.length;
    h+='<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:10px">';
    for(const f of cur.fields){
      h+='<div><input class="text-input" id="qinput_'+f.id+'" type="text" placeholder="'+esc(f.ph||'')+'" value="'+esc(answers[f.id]||'')+'" oninput="answers[\''+f.id+'\']=this.value;checkMultiNext()" onkeydown="if(event.key===\'Enter\'&&!document.getElementById(\'nextbtn\').disabled)goNext()"></div>';
    }
    h+='</div>';
    var allFilled=cur.fields.every(function(f){return !f.req||answers[f.id];});
    h+='<button class="primary" id="nextbtn" style="margin-top:16px" '+(allFilled?'':'disabled')+' onclick="goNext()">'+(step===total-1?t.review:t.next)+'</button>';
  }
  h+='</div>';
  h+='<div class="nav-center"><button class="ghost" onclick="goBack()">'+t.back+'</button></div>';
  app.innerHTML=h;

  if(cur.type==='text'){var inp=document.getElementById('qinput');if(inp)setTimeout(function(){inp.focus();},100);}
  if(cur.type==='multi'){var inp2=document.getElementById('qinput_'+cur.fields[0].id);if(inp2)setTimeout(function(){inp2.focus();},100);}
}

function checkMultiNext(){
  const steps=getSteps();const cur=steps[step];if(!cur||cur.type!=='multi')return;
  var allFilled=cur.fields.every(function(f){return !f.req||answers[f.id];});
  var btn=document.getElementById('nextbtn');if(btn)btn.disabled=!allFilled;
}

function copySum(){
  navigator.clipboard.writeText(genSummary()).then(function(){
    var btn=document.getElementById('copyBtn');if(btn){btn.textContent=LANG[lang].copied;setTimeout(function(){btn.textContent=LANG[lang].copyText;},2000);}
  });
}

render();
</script>
</body>
</html>
